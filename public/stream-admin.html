<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay Keys</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 0 16px;
            background: #111;
            color: #f3f3f3;
        }
        h1, h2 { margin: 12px 0; }
        .card {
            background: #1d1d1d;
            border: 1px solid #353535;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        label { display: block; margin: 8px 0 4px; }
        input, select, button {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #404040;
            background: #121212;
            color: #fff;
        }
        button {
            cursor: pointer;
            background: #0d63cf;
            border: none;
            margin-top: 10px;
        }
        button.secondary {
            background: #444;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .hidden { display: none; }
        .mono { font-family: monospace; }
        .key-row {
            border-top: 1px solid #2f2f2f;
            padding: 10px 0;
        }
        .muted { color: #bcbcbc; font-size: 13px; }
        .error { color: #ff7070; margin-top: 8px; }
        .success { color: #7be07b; margin-top: 8px; }

        /* Card header with 3-dot menu */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .card-header h2 { margin: 0; }

        .menu-wrap {
            position: relative;
        }
        .menu-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            line-height: 1;
            padding: 4px 8px;
            margin: 0;
            width: auto;
            border-radius: 6px;
            cursor: pointer;
        }
        .menu-btn:hover { background: #2e2e2e; color: #fff; }

        .dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 4px);
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            min-width: 180px;
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        .dropdown.open { display: block; }
        .dropdown button {
            background: none;
            border: none;
            color: #f3f3f3;
            text-align: left;
            padding: 10px 14px;
            margin: 0;
            border-radius: 0;
            font-size: 14px;
            width: 100%;
        }
        .dropdown button:hover { background: #3a3a3a; }
        .dropdown button.danger { color: #ff7070; }
        .dropdown button.danger:hover { background: #3d1f1f; }
    </style>
</head>
<body>
    <h1>Stream Overlay Key Manager</h1>

    <div id="login-card" class="card">
        <h2>User Login</h2>
        <div id="bootstrap-note" class="muted hidden"></div>
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password">
        <button id="login-btn">Login</button>
        <button id="bootstrap-btn" class="secondary">Create User</button>
        <div id="login-msg"></div>
    </div>

    <div id="admin-card" class="hidden">
        <div class="card">
            <div class="card-header">
                <h2>My Stream Overlay</h2>
                <div class="menu-wrap">
                    <button class="menu-btn" id="card-menu-btn" title="More options">⋮</button>
                    <div class="dropdown" id="card-dropdown">
                        <button id="rotate-key-btn" class="danger">Create New Key</button>
                    </div>
                </div>
            </div>

            <label for="stream-url">My Stream URL</label>
            <input id="stream-url" class="mono" type="text" readonly>
            <button id="copy-url-btn" class="secondary">Copy Stream URL</button>
            <div class="row">
                <div>
                    <label for="region">Region</label>
                    <select id="region"></select>
                </div>
                <div>
                    <label for="cclass">Class</label>
                    <select id="cclass"></select>
                </div>
            </div>
            <label for="driver">Driver (text)</label>
            <input id="driver" type="text" placeholder="Driver name">
            <label for="override">Manual Text Override (optional)</label>
            <input id="override" type="text" placeholder="Text displayed in overlay instead of driver">
            <button id="create-btn">Save Changes</button>
            <button id="logout-btn" class="secondary">Logout</button>
            <div id="create-msg"></div>
        </div>
    </div>

    <script src="/stream-admin.js"></script>
    <script>
        // 3-dot menu toggle
        const menuBtn = document.getElementById('card-menu-btn');
        const dropdown = document.getElementById('card-dropdown');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('open');
        });
        document.addEventListener('click', () => dropdown.classList.remove('open'));
    </script>
</body>
</html>
